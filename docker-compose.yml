services:
  product-db:
    image: postgres:latest
    container_name: product-service-db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=ProductDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: always
  redis:
    image: redis:7-alpine
    container_name: product_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data  

volumes:
  postgres_data:
  redis_data: